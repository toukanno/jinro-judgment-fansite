function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'OK!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'コピー';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function renderCopipe(filter = '') {
  const listEl = document.getElementById('copipeList');
  const lowerFilter = filter.toLowerCase();

  const html = COPIPE_DATA.map((cat, catIdx) => {
    const filteredItems = cat.items.filter(item =>
      item.text.toLowerCase().includes(lowerFilter) ||
      item.note.toLowerCase().includes(lowerFilter) ||
      cat.category.toLowerCase().includes(lowerFilter)
    );

    if (filteredItems.length === 0) return '';

    return `
      <div class="copipe-category" id="cat-${catIdx}">
        <div class="copipe-category-title">${cat.icon} ${cat.category}</div>
        ${filteredItems.map(item => `
          <div class="copipe-item">
            <div class="copipe-text">
              ${escapeHtml(item.text)}
              <div class="copipe-note">${escapeHtml(item.note)}</div>
            </div>
            <button class="copy-btn" onclick="copyText(${escapeAttr(item.text)}, this)">コピー</button>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');

  listEl.innerHTML = html || '<p style="color:#8b949e;text-align:center;padding:2rem;">該当するセリフが見つかりません。</p>';
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

function escapeAttr(str) {
  return JSON.stringify(str).replace(/</g, '\\u003c').replace(/>/g, '\\u003e');
}

// Category navigation

navEl.innerHTML = COPIPE_DATA.map((cat, i) =>

// Search
document.getElementById('copipeSearch').addEventListener('input', (e) => {

});
