<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#161b22">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="人狼JGDB">
  <title>キャラクター紹介 - 人狼ジャッジメント攻略</title>
  <meta name="description" content="人狼ジャッジメントに登場する全キャラクター（アバター）の紹介。性格・特徴・見た目の詳細情報。">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .char-hero-section {
      background: linear-gradient(135deg, #1a1025 0%, #0d1117 50%, #0a1628 100%);
      padding: 3rem 1.5rem 2rem;
      text-align: center;
      border-bottom: 1px solid #30363d;
    }
    .char-hero-section h1 {
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(90deg, #a78bfa, #58a6ff, #7ee787);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .5rem;
    }
    .char-hero-section p {
      color: #8b949e;
      font-size: 1.05rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .char-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .char-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .char-card:hover {
      transform: translateY(-3px);
      border-color: #58a6ff;
      box-shadow: 0 4px 20px rgba(88,166,255,.1);
    }
    .char-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }
    .char-card.male::before { background: linear-gradient(90deg, #58a6ff, #79c0ff); }
    .char-card.female::before { background: linear-gradient(90deg, #f778ba, #db7ff7); }

    .char-card-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
      border: 2px solid #30363d;
    }
    .char-card.male .char-card-avatar {
      background: linear-gradient(135deg, #0a1628, #162447);
      border-color: rgba(88,166,255,.3);
    }
    .char-card.female .char-card-avatar {
      background: linear-gradient(135deg, #1a0f20, #2d1b3d);
      border-color: rgba(219,127,247,.3);
    }

    .char-card-name {
      font-size: 1.25rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: .3rem;
      color: #e6edf3;
    }
    .char-card-ruby {
      font-size: .78rem;
      color: #8b949e;
      text-align: center;
      margin-bottom: .8rem;
    }

    .char-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      justify-content: center;
      margin-bottom: .8rem;
    }
    .char-tag {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 600;
    }
    .char-tag.gender-male {
      background: rgba(88,166,255,.12);
      color: #58a6ff;
      border: 1px solid rgba(88,166,255,.25);
    }
    .char-tag.gender-female {
      background: rgba(247,120,186,.12);
      color: #f778ba;
      border: 1px solid rgba(247,120,186,.25);
    }
    .char-tag.age {
      background: rgba(126,231,135,.1);
      color: #7ee787;
      border: 1px solid rgba(126,231,135,.25);
    }

    .char-card-desc {
      color: #c9d1d9;
      font-size: .88rem;
      line-height: 1.7;
      text-align: center;
    }

    .char-card-personality {
      margin-top: .8rem;
      padding-top: .8rem;
      border-top: 1px solid #21262d;
      font-size: .82rem;
      color: #8b949e;
      text-align: center;
    }
    .char-card-personality strong {
      color: #c9d1d9;
    }

    .char-filter {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .char-count {
      color: #8b949e;
      font-size: .9rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 600px) {
      .char-hero-section h1 { font-size: 1.6rem; }
      .char-hero-section { padding: 2rem 1rem 1.5rem; }
      .char-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">

        <li><a href="glossary.html">用語集</a></li>

<section class="char-hero-section">
  <h1>&#x1F3AD; キャラクター紹介</h1>
  <p>人狼ジャッジメントに登場するキャラクター（アバター）の一覧。個性豊かなキャラクターたちを紹介します。</p>
</section>

<main class="container">
  <div class="breadcrumb"><a href="index.html">ホーム</a> <span>&gt;</span> キャラクター紹介</div>

  <div class="char-filter">
    <input type="text" class="search-input" id="charSearch" placeholder="キャラクター名で検索...">
    <button class="filter-btn active" data-gender="all">全て</button>
    <button class="filter-btn" data-gender="male">男性</button>
    <button class="filter-btn" data-gender="female">女性</button>
  </div>
  <div class="char-count" id="charCount"></div>

  <div class="char-cards" id="charCards"></div>
</main>

<footer class="site-footer">
  <p>人狼ジャッジメント 攻略データベース - ファンサイト</p>
  <p>本サイトは非公式のファンサイトです。</p>
</footer>

<script src="js/common.js"></script>
<script>
(function() {
  var CHARACTERS = [
    { name: 'ゲイル', ruby: 'Gale', gender: 'male', age: '青年',
      icon: '&#x1F9D1;', personality: '正義感・熱血',
      desc: '正義感が強く、曲がったことが大嫌いな熱血青年。リーダーシップがあり、議論を引っ張る存在。金髪が特徴的。' },
    { name: 'リリアン', ruby: 'Lillian', gender: 'female', age: '少女',
      icon: '&#x1F478;', personality: '上品・お嬢様',
      desc: '裕福な家庭で育ったお嬢様。おしとやかで上品な物腰だが、芯の強さも持ち合わせている。' },
    { name: 'エマ', ruby: 'Emma', gender: 'female', age: '少女',
      icon: '&#x1F467;', personality: '活発・元気',
      desc: '明るく元気いっぱいの少女。天真爛漫な性格で場を和ませるムードメーカー。好奇心旺盛。' },
    { name: 'フランク', ruby: 'Frank', gender: 'male', age: '壮年',
      icon: '&#x1F4AA;', personality: '豪快・頼れる',
      desc: '大柄で頼れる壮年の男性。豪快な性格で面倒見が良い。力仕事はお任せ。' },
    { name: 'ミカエル', ruby: 'Michael', gender: 'male', age: '青年',
      icon: '&#x1F9D0;', personality: '知的・冷静',
      desc: '冷静沈着で頭脳明晰な青年。論理的な思考で議論をリードする。感情に流されない分析力が武器。' },
    { name: 'メアリー', ruby: 'Mary', gender: 'female', age: '成人',
      icon: '&#x1F469;', personality: '落ち着き・包容力',
      desc: '落ち着いた雰囲気の大人の女性。包容力があり、周囲を安心させる存在。冷静な判断力を持つ。' },
    { name: 'ヒュー', ruby: 'Hugh', gender: 'male', age: '老年',
      icon: '&#x1F9D3;', personality: '温厚・経験豊富',
      desc: '穏やかで知恵のある老紳士。豊富な人生経験から的確な助言をくれる。村の長老的存在。' },
    { name: 'サンドラ', ruby: 'Sandra', gender: 'female', age: '成人',
      icon: '&#x1F52E;', personality: '神秘的・洞察力',
      desc: '神秘的な雰囲気を纏う女性。鋭い洞察力を持ち、人の本質を見抜く力がある。占い師のような風貌。' },
    { name: 'ボブ', ruby: 'Bob', gender: 'male', age: '成人',
      icon: '&#x1F603;', personality: 'お人好し・陽気',
      desc: 'お人好しで陽気な男性。ふくよかな体型で親しみやすい雰囲気。誰とでも仲良くなれる。' },
    { name: 'グレース', ruby: 'Grace', gender: 'female', age: '成人',
      icon: '&#x1F4DA;', personality: '知的・真面目',
      desc: '知的で真面目な眼鏡の女性。几帳面な性格で情報の整理が得意。論理的に物事を考える。' },
    { name: 'ジェシカ', ruby: 'Jessica', gender: 'female', age: '成人',
      icon: '&#x1F483;', personality: '華やか・社交的',
      desc: '華やかで美しい女性。社交的な性格で人脈が広い。場の空気を読む力に長けている。' },
    { name: 'エリック', ruby: 'Eric', gender: 'male', age: '青年',
      icon: '&#x1F60E;', personality: 'クール・寡黙',
      desc: 'クールで寡黙な黒髪の青年。必要最低限しか話さないが、発言には重みがある。観察力が鋭い。' },
    { name: 'アンナ', ruby: 'Anna', gender: 'female', age: '少女',
      icon: '&#x1F338;', personality: '内気・純粋',
      desc: '内気で大人しい少女。純粋な心の持ち主で、嘘をつくのが苦手。控えめだが芯は強い。' },
    { name: 'ローラ', ruby: 'Laura', gender: 'female', age: '成人',
      icon: '&#x1F31F;', personality: '活発・自由奔放',
      desc: '自由奔放で活発な女性。行動力があり、思い立ったらすぐ動くタイプ。束縛を嫌う。' },
    { name: 'マイク', ruby: 'Mike', gender: 'male', age: '青年',
      icon: '&#x26BD;', personality: 'スポーティ・爽やか',
      desc: 'スポーツ万能の爽やかな青年。体力と行動力に自信あり。明るく前向きな性格。' },
    { name: 'ロディ', ruby: 'Roddy', gender: 'male', age: '少年',
      icon: '&#x1F466;', personality: '元気・いたずら好き',
      desc: '元気いっぱいの少年。いたずら好きだが憎めない性格。子供ならではの鋭い観察眼を持つ。' },
    { name: 'リック', ruby: 'Rick', gender: 'male', age: '成人',
      icon: '&#x1F575;', personality: '無口・ミステリアス',
      desc: '無口でミステリアスな男性。多くを語らないが、的確な指摘で議論の流れを変えることがある。' },
    { name: 'フェイ', ruby: 'Fay', gender: 'female', age: '少女',
      icon: '&#x1F9DA;', personality: '不思議・天然',
      desc: '不思議な雰囲気を持つ少女。天然でマイペースだが、時折核心を突く発言をする。' },
    { name: 'レイチェル', ruby: 'Rachel', gender: 'female', age: '成人',
      icon: '&#x1F451;', personality: '気品・プライド',
      desc: '気品に満ちた女性。プライドが高く、自分の意見をしっかり持っている。リーダーシップも発揮する。' },
    { name: 'ステラ', ruby: 'Stella', gender: 'female', age: '成人',
      icon: '&#x2B50;', personality: 'ミステリアス・妖艶',
      desc: 'ミステリアスで妖艶な雰囲気の女性。真意が読みにくく、味方なのか敵なのか判断がつきにくい存在。' }
  ];

  var cards = document.getElementById('charCards');
  var searchInput = document.getElementById('charSearch');
  var countEl = document.getElementById('charCount');
  var activeGender = 'all';

  function render(filter, gender) {
    filter = filter || '';
    gender = gender || 'all';
    var filtered = CHARACTERS.filter(function(c) {
      var matchName = c.name.indexOf(filter) !== -1 || c.ruby.toLowerCase().indexOf(filter.toLowerCase()) !== -1 || c.desc.indexOf(filter) !== -1;
      var matchGender = gender === 'all' || c.gender === gender;
      return matchName && matchGender;
    });

    countEl.textContent = filtered.length + ' 人のキャラクターが見つかりました';

    cards.innerHTML = filtered.map(function(c) {
      return '<div class="char-card ' + c.gender + '">' +
        '<div class="char-card-avatar">' + c.icon + '</div>' +
        '<div class="char-card-name">' + c.name + '</div>' +
        '<div class="char-card-ruby">' + c.ruby + '</div>' +
        '<div class="char-card-tags">' +
          '<span class="char-tag gender-' + c.gender + '">' + (c.gender === 'male' ? '男性' : '女性') + '</span>' +
          '<span class="char-tag age">' + c.age + '</span>' +
        '</div>' +
        '<div class="char-card-desc">' + c.desc + '</div>' +
        '<div class="char-card-personality"><strong>性格:</strong> ' + c.personality + '</div>' +
      '</div>';
    }).join('');
  }

  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeGender = btn.dataset.gender;
      render(searchInput.value, activeGender);
    });
  });

  searchInput.addEventListener('input', function() {
    render(searchInput.value, activeGender);
  });

  render();
})();
</script>
</body>
