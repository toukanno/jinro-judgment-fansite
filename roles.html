<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>役職一覧 - 人狼ジャッジメント攻略</title>
  <meta name="description" content="人狼ジャッジメントの全役職の能力・陣営・立ち回りを検索・フィルタリングできるデータベース。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-logo"><span class="wolf-icon">&#x1F43A;</span> 人狼JGデータベース</a>
    <button class="nav-toggle" aria-label="メニュー">&#9776;</button>
    <nav class="main-nav">
      <ul>
        <li><a href="index.html">ホーム</a></li>
        <li><a href="roles.html">役職一覧</a></li>
        <li><a href="guide.html">初心者ガイド</a></li>
        <li><a href="strategy.html">立ち回り</a></li>
        <li><a href="composition.html">編成考察</a></li>
        <li><a href="glossary.html">用語集</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="container">
  <div class="breadcrumb"><a href="index.html">ホーム</a> <span>&gt;</span> 役職一覧</div>

  <div class="section-header">
    <h2>&#x1F3AD; 役職データベース</h2>
    <div class="btn-group" style="margin:0;">
      <button class="btn btn-sm btn-secondary" onclick="toggleView('grid')" id="viewGrid">&#x25A6; カード表示</button>
      <button class="btn btn-sm btn-ghost" onclick="toggleView('table')" id="viewTable">&#x2630; テーブル表示</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">28</div>
      <div class="stat-label">全役職</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="-webkit-text-fill-color:#7ee787;">13</div>
      <div class="stat-label">&#x1F33F; 市民陣営</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="-webkit-text-fill-color:#f85149;">7</div>
      <div class="stat-label">&#x1F43A; 人狼陣営</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="-webkit-text-fill-color:#d29922;">3</div>
      <div class="stat-label">&#x1F98A; 妖狐陣営</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="-webkit-text-fill-color:#db7ff7;">1</div>
      <div class="stat-label">&#x1F495; 恋人陣営</div>
    </div>
  </div>

  <!-- Search & Filter -->
  <div class="search-bar">
    <input type="text" class="search-input" id="roleSearch" placeholder="&#x1F50D; 役職名・能力で検索...">
    <button class="filter-btn active" data-team="all">全て</button>
    <button class="filter-btn" data-team="village">&#x1F33F; 市民</button>
    <button class="filter-btn" data-team="werewolf">&#x1F43A; 人狼</button>
    <button class="filter-btn" data-team="fox">&#x1F98A; 妖狐</button>
    <button class="filter-btn" data-team="lovers">&#x1F495; 恋人</button>
  </div>

  <!-- Quick filter buttons -->
  <div class="btn-group" style="margin-bottom:1.5rem;">
    <button class="btn btn-sm btn-ghost" onclick="filterByAttr('nightAction')">&#x1F319; 夜行動ありのみ</button>
    <button class="btn btn-sm btn-ghost" onclick="filterByAttr('basic')">&#x2B50; 基本役職のみ</button>
    <button class="btn btn-sm btn-ghost" onclick="filterByAttr('special')">&#x1F48E; 特殊役職のみ</button>
    <button class="btn btn-sm btn-ghost" onclick="filterByAttr('reset')">&#x21BA; リセット</button>
  </div>

  <div class="role-count" id="roleCount"></div>

  <!-- Card View -->
  <div id="roleList" class="card-grid"></div>

  <!-- Table View -->
  <div id="tableView" style="display:none;">
    <h2 class="section-title" style="margin-top:2rem;">&#x1F4CA; 役職比較表</h2>
    <div style="overflow-x:auto;">
      <table class="data-table" id="roleTable">
        <thead>
          <tr>
            <th>役職名</th>
            <th>陣営</th>
            <th>レアリティ</th>
            <th>夜アクション</th>
            <th>能力</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p>人狼ジャッジメント 攻略データベース - ファンサイト</p>
  <p>本サイトは非公式のファンサイトです。</p>
</footer>

<!-- Role Detail Modal -->
<div class="modal-overlay" id="roleModal">
  <div class="modal">
    <button class="modal-close" onclick="closeRoleModal()">&times;</button>
    <div id="roleModalContent"></div>
  </div>
</div>

<script src="js/roles-data.js"></script>
<script src="js/common.js"></script>
<script>
(function() {
  const list = document.getElementById('roleList');
  const searchInput = document.getElementById('roleSearch');
  const countEl = document.getElementById('roleCount');
  let activeTeam = 'all';
  let attrFilter = null;
  let currentView = 'grid';

  function toggleView(view) {
    currentView = view;
    document.getElementById('viewGrid').className = 'btn btn-sm ' + (view === 'grid' ? 'btn-secondary' : 'btn-ghost');
    document.getElementById('viewTable').className = 'btn btn-sm ' + (view === 'table' ? 'btn-secondary' : 'btn-ghost');
    document.getElementById('roleList').style.display = view === 'grid' ? '' : 'none';
    document.getElementById('tableView').style.display = view === 'table' ? '' : 'none';
  }
  window.toggleView = toggleView;

  function filterByAttr(attr) {
    attrFilter = attr === 'reset' ? null : attr;
    renderCards(searchInput.value, activeTeam);
  }
  window.filterByAttr = filterByAttr;

  function getFiltered(filter, team) {
    return ROLES_DATA.filter(r => {
      const matchName = r.name.includes(filter) || r.description.includes(filter) || r.ability.includes(filter);
      const matchTeam = team === 'all' || r.team === team;
      let matchAttr = true;
      if (attrFilter === 'nightAction') matchAttr = r.nightAction;
      if (attrFilter === 'basic') matchAttr = r.rarity === '基本';
      if (attrFilter === 'special') matchAttr = r.rarity === '特殊';
      return matchName && matchTeam && matchAttr;
    });
  }

  function renderCards(filter = '', team = 'all') {
    const filtered = getFiltered(filter, team);
    countEl.textContent = `${filtered.length} 件の役職が見つかりました`;

    list.innerHTML = filtered.map(r => {
      const idx = ROLES_DATA.indexOf(r);
      const info = TEAM_INFO[r.team];
      return `<div class="card role-card" onclick="openRoleModal(${idx})" style="cursor:pointer;">
        <h3>${r.name}</h3>
        <span class="role-badge ${r.team}">${info.name}</span>
        <p style="margin-top:.5rem;">${r.description.slice(0, 60)}...</p>
        <div class="card-actions">
          <span class="btn btn-sm btn-outline">&#x1F4D6; 詳細を見る</span>
          <span class="btn btn-sm btn-ghost">${r.nightAction ? '&#x1F319; 夜行動' : '&#x2600; 昼のみ'}</span>
        </div>
      </div>`;
    }).join('');

    // Table
    const tbody = document.querySelector('#roleTable tbody');
    tbody.innerHTML = filtered.map(r => {
      const idx = ROLES_DATA.indexOf(r);
      const info = TEAM_INFO[r.team];
      return `<tr>
        <td><strong>${r.name}</strong></td>
        <td><span class="role-badge ${r.team}">${info.name}</span></td>
        <td>${r.rarity}</td>
        <td>${r.nightAction ? '&#x2705; あり' : '&#x274C; なし'}</td>
        <td>${r.ability}</td>
        <td><button class="btn btn-sm btn-outline" onclick="openRoleModal(${idx})">詳細</button></td>
      </tr>`;
    }).join('');
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn[data-team]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-team]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTeam = btn.dataset.team;
      renderCards(searchInput.value, activeTeam);
    });
  });

  searchInput.addEventListener('input', () => {
    renderCards(searchInput.value, activeTeam);
  });

  renderCards();
})();

// Modal functions (global)
function openRoleModal(idx) {
  const r = ROLES_DATA[idx];
  const info = TEAM_INFO[r.team];

  // Find prev/next indices
  const prevIdx = idx > 0 ? idx - 1 : ROLES_DATA.length - 1;
  const nextIdx = idx < ROLES_DATA.length - 1 ? idx + 1 : 0;

  document.getElementById('roleModalContent').innerHTML = `
    <h3>${r.name}</h3>
    <div class="meta-row">
      <span class="role-badge ${r.team}">${info.name}</span>
      <span class="meta-tag">&#x2728; ${r.rarity}</span>
      <span class="meta-tag">${r.nightAction ? '&#x1F319; 夜行動あり' : '&#x2600; 夜行動なし'}</span>
    </div>
    <div class="meta-row">
      <span class="meta-tag">&#x1F3AF; 能力: ${r.ability}</span>
    </div>
    <div class="description">${r.description}</div>
    <div class="strategy-box">
      <strong>&#x1F4A1; 立ち回りのコツ</strong>
      ${r.strategy}
    </div>
    <div class="modal-actions">
      <button class="btn btn-sm btn-secondary" onclick="openRoleModal(${prevIdx})">&#x25C0; ${ROLES_DATA[prevIdx].name}</button>
      <button class="btn btn-sm btn-secondary" onclick="openRoleModal(${nextIdx})">${ROLES_DATA[nextIdx].name} &#x25B6;</button>
      <a href="strategy.html" class="btn btn-sm btn-outline">&#x1F9E0; 戦術ガイド</a>
      <button class="btn btn-sm btn-ghost" onclick="closeRoleModal()">閉じる</button>
    </div>
  `;
  document.getElementById('roleModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeRoleModal() {
  document.getElementById('roleModal').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('roleModal').addEventListener('click', function(e) {
  if (e.target === this) closeRoleModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeRoleModal();
});
</script>
</body>
</html>
